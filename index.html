<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reverse Pac-Man - Arcade Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }
        
        /* NOUEAU MENU STYLE ARCADE */
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0c0c28 0%, #03030a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }
        .menu-card {
            background: rgba(15, 15, 40, 0.85);
            border: 4px solid #1919a6;
            box-shadow: 0 0 25px #1919a6;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #ff3333;
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 900;
            text-shadow: 0 0 10px #ff3333, 3px 3px 0px #1919a6;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: clamp(13px, 2.5vw, 15px);
            color: #00ffff;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-label {
            font-size: 16px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        /* BOUTON TOGGLE MULTIJOUEUR */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(25, 25, 166, 0.2);
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .toggle-label {
            font-size: 16px;
            font-weight: bold;
            color: #00ffff;
            letter-spacing: 1px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .4s;
            border-radius: 34px;
            border: 2px solid #1919a6;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
        }
        input:checked + .slider {
            background-color: #ff3333;
            border-color: #ff3333;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
            box-shadow: 0 0 8px #ff3333;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            background: linear-gradient(135deg, #1919a6 0%, #0d0d5c 100%);
            color: white;
            border: 2px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            padding: 14px 20px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: linear-gradient(135deg, #ff3333 0%, #990000 100%);
            border-color: #ffffff;
            box-shadow: 0 0 15px #ff3333;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }

        /* INTERFACE EN JEU */
        #ui {
            position: absolute;
            top: 15px;
            left: 70px;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 2px black;
            z-index: 5;
            line-height: 35px;
        }

        /* BOUTON FLÈCHE RETOUR (EN HAUT À GAUCHE) */
        #back-to-menu-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background-color: rgba(25, 25, 166, 0.7);
            border: 2px solid #00ffff;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 6;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        #back-to-menu-btn:hover {
            background-color: #ff3333;
            box-shadow: 0 0 10px #ff3333;
            border-color: #fff;
        }

        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            width: 90%;
        }
        canvas {
            display: block;
        }

        /* MANETTES VIRTUELLES MOBILE MODIFIÉES POUR ÉVITER LE CHEVAUCHEMENT */
        .mobile-pad {
            display: none;
            position: absolute;
            bottom: 5%;
            width: 150px;
            height: 150px;
            z-index: 8;
        }
        /* Position joueur 1 (Bas gauche) */
        #mobile-controls-p1 {
            left: 20px;
        }
        /* Position joueur 2 (Bas droite) */
        #mobile-controls-p2 {
            right: 20px;
        }
        .dpad-btn {
            position: absolute;
            background-color: rgba(25, 25, 166, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.8);
            color: white;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background-color: rgba(255, 0, 0, 0.8);
        }
        
        /* Positionnement interne des touches */
        .btn-up    { top: 0; left: 52px; }
        .btn-left  { top: 52px; left: 0; }
        .btn-right { top: 52px; right: 0; }
        .btn-down  { bottom: 0; left: 52px; }

        /* Changement de couleur pour J2 */
        #mobile-controls-p2 .dpad-btn {
            border-color: #00ffff;
            background-color: rgba(13, 13, 92, 0.6);
        }
        #mobile-controls-p2 .dpad-btn:active {
            background-color: rgba(0, 255, 255, 0.8);
        }

        /* Amélioration de l'espace sur les petits écrans mobiles */
        @media (max-width: 767px) {
            .mobile-pad {
                width: 120px;
                height: 120px;
                bottom: 3%;
            }
            #mobile-controls-p1 { left: 10px; }
            #mobile-controls-p2 { right: 10px; }
            .dpad-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
                border-width: 2px;
            }
            .btn-up    { top: 0; left: 41px; }
            .btn-left  { top: 41px; left: 0; }
            .btn-right { top: 41px; right: 0; }
            .btn-down  { bottom: 0; left: 41px; }
        }
    </style>
</head>
<body>

<div id="menu">
    <div class="menu-card">
        <h1>REVERSE PAC-MAN</h1>
        <div class="subtitle">Incarne le fantôme rouge</div>
        
        <div class="toggle-container">
            <span class="toggle-label">MODE MULTI (2J)</span>
            <label class="switch">
                <input type="checkbox" id="multiplayer-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="menu-label">SÉLECTIONNE LA DIFFICULTÉ</div>
        <div class="btn-container">
            <button onclick="startGame(1)">NIVEAU 1 : LENT</button>
            <button onclick="startGame(2)">NIVEAU 2 : MOYEN</button>
            <button onclick="startGame(3)">NIVEAU 3 : RAPIDE</button>
        </div>
    </div>
</div>

<div id="back-to-menu-btn" style="display: none;" onclick="returnToMenu()">◀</div>

<div id="ui" style="display: none;">
    SCORE: <span id="score-display">0</span>
</div>
<div id="instructions" style="display: none;">Utilise les **Flèches du clavier** pour diriger le fantôme rouge !</div>

<div id="mobile-controls-p1" class="mobile-pad">
    <div class="dpad-btn btn-up" id="btn-up">▲</div>
    <div class="dpad-btn btn-left" id="btn-left">◀</div>
    <div class="dpad-btn btn-right" id="btn-right">▶</div>
    <div class="dpad-btn btn-down" id="btn-down">▼</div>
</div>

<div id="mobile-controls-p2" class="mobile-pad">
    <div class="dpad-btn btn-up" id="btn-up-p2">Z</div>
    <div class="dpad-btn btn-left" id="btn-left-p2">Q</div>
    <div class="dpad-btn btn-right" id="btn-right-p2">D</div>
    <div class="dpad-btn btn-down" id="btn-down-p2">S</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let map = [];
let heatmap = []; 
let cols, rows;
let tileSize;

let currentLevel = 1;
let score = 0;
let gameRunning = false;
let gameOver = false;
let isMobile = false;
let isMultiplayer = false;

// Variables pour la Super Bille Jane / Pac-Gomme
let superBille = { x: -1, y: -1, existe: false };
let pacmanSuperTimer = 0; // Temps restant du pouvoir en frames (60 frames = 1 sec)
let playerKilledByPacman = false; // Permet de savoir qui a gagné la partie

// CHAMP DE VISION DE PAC-MAN (en nombre de cases)
const PACMAN_VISION_RANGE = 6; 

// Personnages
let ghost = { x: 1, y: 1, color: "red" };
let ghost2 = { x: 1, y: 1, color: "#00ffff" }; 
let pacman = { x: 1, y: 1, dirX: 0, dirY: 0, speedTimer: 0, speedCooldown: 20 };

// Variables pour la fluidité et détection AFK
let keysPressed = {};
let ghostMoveTimer = 0;
const ghostMoveCooldown = 8; 
let isJ1Moving = false;
let isJ2Moving = false;

function detectDevice() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

function initGrid() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    tileSize = isMobile ? 32 : 40; 
    
    cols = Math.floor(canvas.width / tileSize);
    rows = Math.floor(canvas.height / tileSize);
    if (cols % 2 === 0) cols--;
    if (rows % 2 === 0) rows--;

    generateRandomMaze();
}

function generateRandomMaze() {
    map = [];
    heatmap = [];
    
    for (let r = 0; r < rows; r++) {
        map[r] = [];
        heatmap[r] = [];
        for (let c = 0; c < cols; c++) {
            map[r][c] = 1;
            heatmap[r][c] = 0;
        }
    }

    let stack = [];
    let currentCell = { x: 1, y: 1 };
    map[currentCell.y][currentCell.x] = 0;

    while (true) {
        let neighbors = [];
        let dirs = [
            { x: 0, y: -2 }, { x: 0, y: 2 },
            { x: -2, y: 0 }, { x: 2, y: 0 }
        ];

        dirs.forEach(d => {
            let nx = currentCell.x + d.x;
            let ny = currentCell.y + d.y;
            if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1) {
                if (map[ny][nx] === 1) {
                    neighbors.push({ x: nx, y: ny, dir: d });
                }
            }
        });

        if (neighbors.length > 0) {
            let next = neighbors[Math.floor(Math.random() * neighbors.length)];
            map[currentCell.y + next.dir.y / 2][currentCell.x + next.dir.x / 2] = 0;
            map[next.y][next.x] = 0;
            stack.push(currentCell);
            currentCell = { x: next.x, y: next.y };
        } else if (stack.length > 0) {
            currentCell = stack.pop();
        } else {
            break;
        }
    }

    for (let i = 0; i < (rows * cols) * 0.05; i++) {
        let rx = Math.floor(Math.random() * (cols - 2)) + 1;
        let ry = Math.floor(Math.random() * (rows - 2)) + 1;
        map[ry][rx] = 0;
    }

    ghost.x = 1;
    ghost.y = 1;
    
    ghost2.x = cols - 2;
    ghost2.y = rows - 2;
    while(map[ghost2.y][ghost2.x] === 1) {
        ghost2.x--;
        if(ghost2.x < 1) { ghost2.x = cols - 2; ghost2.y--; }
    }
    
    pacman.x = Math.floor(cols / 2);
    pacman.y = Math.floor(rows / 2);
    while(map[pacman.y][pacman.x] === 1) {
        pacman.x++;
        if(pacman.x >= cols - 1) { pacman.x = 1; pacman.y++; }
    }

    // Génération de l'unique Super Bille Jane à un endroit vide aléatoire
    superBille.existe = true;
    let bX, bY;
    do {
        bX = Math.floor(Math.random() * (cols - 2)) + 1;
        bY = Math.floor(Math.random() * (rows - 2)) + 1;
    } while (map[bY][bX] === 1 || (bX === pacman.x && bY === pacman.y) || (bX === ghost.x && bY === ghost.y));
    superBille.x = bX;
    superBille.y = bY;
}

function startGame(level) {
    currentLevel = level;
    detectDevice();
    
    keysPressed = {}; 
    isJ1Moving = false;
    isJ2Moving = false;
    pacmanSuperTimer = 0;
    playerKilledByPacman = false;
    
    isMultiplayer = document.getElementById("multiplayer-toggle").checked;
    
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("back-to-menu-btn").style.display = "flex";
    
    if (isMobile) {
        let pad1 = document.getElementById("mobile-controls-p1");
        pad1.style.display = "block";
        if (isMultiplayer) {
            pad1.style.left = "20px";
            pad1.style.transform = "none";
            document.getElementById("mobile-controls-p2").style.display = "block";
        } else {
            pad1.style.left = "50%";
            pad1.style.transform = "translateX(-50%)";
            document.getElementById("mobile-controls-p2").style.display = "none";
        }
        document.getElementById("instructions").style.display = "none";
    } else {
        document.getElementById("mobile-controls-p1").style.display = "none";
        document.getElementById("mobile-controls-p2").style.display = "none";
        let inst = document.getElementById("instructions");
        inst.style.display = "block";
        if (isMultiplayer) {
            inst.innerHTML = "J1 (Rouge) : **Flèches** | J2 (Bleu) : **ZQSD**";
        } else {
            inst.innerHTML = "Utilise les **Flèches du clavier** pour diriger le fantôme rouge !";
        }
    }

    pacman.speedCooldown = Math.max(5, 22 - (level * 5)); 
    
    initGrid();
    gameRunning = true;
    gameOver = false;
    draw();
}

function moveGhost(dx, dy) {
    if (!gameRunning || gameOver) return;
    let nextX = ghost.x + dx;
    let nextY = ghost.y + dy;
    if (map[nextY] && map[nextY][nextX] === 0) {
        ghost.x = nextX;
        ghost.y = nextY;
    }
    checkCollision();
}

function moveGhost2(dx, dy) {
    if (!gameRunning || gameOver || !isMultiplayer) return;
    let nextX = ghost2.x + dx;
    let nextY = ghost2.y + dy;
    if (map[nextY] && map[nextY][nextX] === 0) {
        ghost2.x = nextX;
        ghost2.y = nextY;
    }
    checkCollision();
}

window.addEventListener("keydown", e => {
    keysPressed[e.key] = true;
    if (gameOver && (e.key === " " || e.key === "Enter")) {
        returnToMenu();
    }
});

window.addEventListener("keyup", e => {
    delete keysPressed[e.key];
});

function handlePlayersInput() {
    isJ1Moving = false;
    isJ2Moving = false;

    if (keysPressed["ArrowUp"]) { moveGhost(0, -1); isJ1Moving = true; }
    else if (keysPressed["ArrowDown"]) { moveGhost(0, 1); isJ1Moving = true; }
    else if (keysPressed["ArrowLeft"]) { moveGhost(-1, 0); isJ1Moving = true; }
    else if (keysPressed["ArrowRight"]) { moveGhost(1, 0); isJ1Moving = true; }
    
    if (keysPressed["z"] || keysPressed["Z"]) { moveGhost2(0, -1); isJ2Moving = true; }
    else if (keysPressed["s"] || keysPressed["S"]) { moveGhost2(0, 1); isJ2Moving = true; }
    else if (keysPressed["q"] || keysPressed["Q"]) { moveGhost2(-1, 0); isJ2Moving = true; }
    else if (keysPressed["d"] || keysPressed["D"]) { moveGhost2(1, 0); isJ2Moving = true; }
}

// Mobile Controls
document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["ArrowUp"] = true; });
document.getElementById("btn-up").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["ArrowUp"]; });
document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["ArrowDown"] = true; });
document.getElementById("btn-down").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["ArrowDown"]; });
document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["ArrowLeft"] = true; });
document.getElementById("btn-left").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["ArrowLeft"]; });
document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["ArrowRight"] = true; });
document.getElementById("btn-right").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["ArrowRight"]; });

document.getElementById("btn-up-p2").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["z"] = true; });
document.getElementById("btn-up-p2").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["z"]; });
document.getElementById("btn-down-p2").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["s"] = true; });
document.getElementById("btn-down-p2").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["s"]; });
document.getElementById("btn-left-p2").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["q"] = true; });
document.getElementById("btn-left-p2").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["q"]; });
document.getElementById("btn-right-p2").addEventListener("touchstart", (e) => { e.preventDefault(); keysPressed["d"] = true; });
document.getElementById("btn-right-p2").addEventListener("touchend", (e) => { e.preventDefault(); delete keysPressed["d"]; });

window.addEventListener("touchstart", () => {
    if (gameOver) returnToMenu();
});

function returnToMenu() {
    gameRunning = false;
    document.getElementById("menu").style.display = "flex";
    document.getElementById("ui").style.display = "none";
    document.getElementById("back-to-menu-btn").style.display = "none";
    document.getElementById("mobile-controls-p1").style.display = "none";
    document.getElementById("mobile-controls-p2").style.display = "none";
    document.getElementById("instructions").style.display = "none";
}

// IA DE PAC-MAN MODIFIÉE AVEC CHAMP DE VISION LIMITÉ
function movePacman() {
    let directions = [{x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0}];
    
    // On marque l'endroit actuel avec une forte valeur de mémoire
    heatmap[pacman.y][pacman.x] += 15;

    let isPacmanSuper = pacmanSuperTimer > 0;

    // Détection immédiate du joueur DEVANT Pac-Man (Face-à-face)
    let faceToFace = false;
    let targetX = pacman.x + pacman.dirX;
    let targetY = pacman.y + pacman.dirY;

    if ((isJ1Moving && targetX === ghost.x && targetY === ghost.y) || 
        (isMultiplayer && isJ2Moving && targetX === ghost2.x && targetY === ghost2.y)) {
        faceToFace = true;
    }

    // Filtre les directions valides
    let validDirections = directions.filter(d => {
        let nextX = pacman.x + d.x;
        let nextY = pacman.y + d.y;
        return map[nextY] && map[nextY][nextX] === 0;
    });

    if (validDirections.length > 0) {
        let choices = validDirections;

        // Si Pacman ne chasse pas et qu'il n'y a pas de face-à-face, on évite le demi-tour spontané
        if (!isPacmanSuper && !faceToFace) {
            let forwardDirections = validDirections.filter(d => !(d.x === -pacman.dirX && d.y === -pacman.dirY));
            if (forwardDirections.length > 0) choices = forwardDirections;
        }

        let bestChoices = [];
        let optimalScore = isPacmanSuper ? Infinity : -Infinity; 

        choices.forEach(d => {
            let nextX = pacman.x + d.x;
            let nextY = pacman.y + d.y;
            
            // Calcul de la distance réelle par rapport aux joueurs
            let distToJ1 = Math.abs(nextX - ghost.x) + Math.abs(nextY - ghost.y);
            if (!isJ1Moving && nextX === ghost.x && nextY === ghost.y) distToJ1 = 0.1;

            let distToJ2 = Infinity;
            if (isMultiplayer) {
                distToJ2 = Math.abs(nextX - ghost2.x) + Math.abs(nextY - ghost2.y);
                if (!isJ2Moving && nextX === ghost2.x && nextY === ghost2.y) distToJ2 = 0.1;
            }

            let scoreCalculated = 0;

            if (isPacmanSuper) {
                // EN MODE SUPER : Pac-man traque le joueur le plus proche (indépendamment de la distance de vision)
                let minPlayerDist = Math.min(distToJ1, distToJ2);
                scoreCalculated = minPlayerDist * 10 + heatmap[nextY][nextX] * 0.5;
                if (scoreCalculated < optimalScore) {
                    optimalScore = scoreCalculated;
                    bestChoices = [d];
                } else if (scoreCalculated === optimalScore) {
                    bestChoices.push(d);
                }
            } else {
                // EN MODE NORMAL : APPLICATION DU CHAMP DE VISION
                // Si les joueurs sont plus loin que la zone de vision, Pacman "ignore" leur présence (distance infinie fictive)
                let visibleDistJ1 = distToJ1 <= PACMAN_VISION_RANGE ? distToJ1 : 999;
                let visibleDistJ2 = distToJ2 <= PACMAN_VISION_RANGE ? distToJ2 : 999;
                let minVisibleDist = Math.min(visibleDistJ1, visibleDistJ2);

                let biasBille = 0;
                if (superBille.existe) {
                    let distToBille = Math.abs(nextX - superBille.x) + Math.abs(nextY - superBille.y);
                    if (distToBille < 8) {
                        biasBille = (8 - distToBille) * 15; 
                    }
                }
                
                if (minVisibleDist === 999) {
                    // Les joueurs sont trop loin : Pac-Man explore en évitant sa heatmap et attiré par la bille jane
                    scoreCalculated = - (heatmap[nextY][nextX] * 3) + biasBille;
                } else {
                    // Un joueur est proche : Mode panique / fuite actif !
                    scoreCalculated = (minVisibleDist * 25) - (heatmap[nextY][nextX] * 2) + biasBille;
                }
                
                if (scoreCalculated > optimalScore) {
                    optimalScore = scoreCalculated;
                    bestChoices = [d];
                } else if (scoreCalculated === optimalScore) {
                    bestChoices.push(d);
                }
            }
        });

        if (bestChoices.length > 0) {
            let choice = bestChoices[Math.floor(Math.random() * bestChoices.length)];
            pacman.dirX = choice.x;
            pacman.dirY = choice.y;
        }
    }

    let nextX = pacman.x + pacman.dirX;
    let nextY = pacman.y + pacman.dirY;

    if (map[nextY] && map[nextY][nextX] === 0) {
        pacman.x = nextX;
        pacman.y = nextY;
    }

    // Pac-Man mange la Super Bille Jane ?
    if (superBille.existe && pacman.x === superBille.x && pacman.y === superBille.y) {
        superBille.existe = false; 
        pacmanSuperTimer = 5 * 60; 
    }

    checkCollision();
}

function checkCollision() {
    let touchedJ1 = (ghost.x === pacman.x && ghost.y === pacman.y);
    let touchedJ2 = (isMultiplayer && ghost2.x === pacman.x && ghost2.y === pacman.y);

    if (touchedJ1 || touchedJ2) {
        if (pacmanSuperTimer > 0) {
            playerKilledByPacman = true;
            gameOver = true;
        } else {
            score += 100 * currentLevel;
            document.getElementById("score-display").innerText = score;
            playerKilledByPacman = false;
            gameOver = true;
        }
    }
}

function draw() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Diminuer le timer du pouvoir de Pac-man à chaque frame
    if (pacmanSuperTimer > 0) {
        pacmanSuperTimer--;
    }

    // Évaporation lente de la mémoire (heatmap) pour éviter de bloquer l'IA à long terme
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (heatmap[r][c] > 0) {
                heatmap[r][c] -= 0.02; 
                if (heatmap[r][c] < 0) heatmap[r][c] = 0;
            }
        }
    }

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (map[r][c] === 1) {
                ctx.fillStyle = "#1919a6";
                ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
            }
        }
    }

    // Dessiner la Super Bille Jane si elle existe encore
    if (superBille.existe) {
        ctx.fillStyle = "#ffcc00";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ffcc00";
        ctx.beginPath();
        ctx.arc(superBille.x * tileSize + tileSize/2, superBille.y * tileSize + tileSize/2, tileSize/4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 0; 
    }

    // Dessiner Pac-Man (il clignote s'il a le super pouvoir)
    if (pacmanSuperTimer > 0 && Math.floor(pacmanSuperTimer / 5) % 2 === 0) {
        ctx.fillStyle = "#ff3333"; 
    } else {
        ctx.fillStyle = "yellow";
    }
    ctx.beginPath();
    ctx.arc(pacman.x * tileSize + tileSize/2, pacman.y * tileSize + tileSize/2, tileSize/2 - 3, 0.2 * Math.PI, 1.8 * Math.PI);
    ctx.lineTo(pacman.x * tileSize + tileSize/2, pacman.y * tileSize + tileSize/2);
    ctx.fill();

    // Dessiner le Fantôme 1 (Rouge)
    ctx.fillStyle = ghost.color;
    ctx.beginPath();
    ctx.arc(ghost.x * tileSize + tileSize/2, ghost.y * tileSize + tileSize/2, tileSize/2 - 3, Math.PI, 0, false);
    ctx.lineTo(ghost.x * tileSize + tileSize - 3, ghost.y * tileSize + tileSize - 3);
    ctx.lineTo(ghost.x * tileSize + 3, ghost.y * tileSize + tileSize - 3);
    ctx.fill();
    
    ctx.fillStyle = "white";
    ctx.fillRect(ghost.x * tileSize + (tileSize*0.22), ghost.y * tileSize + (tileSize*0.28), tileSize*0.16, tileSize*0.16);
    ctx.fillRect(ghost.x * tileSize + (tileSize*0.62), ghost.y * tileSize + (tileSize*0.28), tileSize*0.16, tileSize*0.16);

    // Dessiner le Fantôme 2 (Bleu)
    if (isMultiplayer) {
        ctx.fillStyle = ghost2.color;
        ctx.beginPath();
        ctx.arc(ghost2.x * tileSize + tileSize/2, ghost2.y * tileSize + tileSize/2, tileSize/2 - 3, Math.PI, 0, false);
        ctx.lineTo(ghost2.x * tileSize + tileSize - 3, ghost2.y * tileSize + tileSize - 3);
        ctx.lineTo(ghost2.x * tileSize + 3, ghost2.y * tileSize + tileSize - 3);
        ctx.fill();
        
        ctx.fillStyle = "white";
        ctx.fillRect(ghost2.x * tileSize + (tileSize*0.22), ghost2.y * tileSize + (tileSize*0.28), tileSize*0.16, tileSize*0.16);
        ctx.fillRect(ghost2.x * tileSize + (tileSize*0.62), ghost2.y * tileSize + (tileSize*0.28), tileSize*0.16, tileSize*0.16);
    }

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = "bold 24px 'Courier New'";
        ctx.textAlign = "center";
        
        if (playerKilledByPacman) {
            ctx.fillStyle = "red";
            ctx.fillText("PAC-MAN VOUS A TUÉ !", canvas.width / 2, canvas.height / 2 - 20);
        } else {
            ctx.fillStyle = "lime";
            ctx.fillText("BIEN JOUÉ !", canvas.width / 2, canvas.height / 2 - 20);
        }
        
        ctx.fillStyle = "white";
        ctx.font = "16px 'Courier New'";
        let msg = isMobile ? "Touche l'écran pour rejouer" : "Appuie sur ESPACE pour rejouer";
        ctx.fillText(msg, canvas.width / 2, canvas.height / 2 + 20);
        return;
    }

    ghostMoveTimer++;
    if (ghostMoveTimer >= ghostMoveCooldown) {
        handlePlayersInput();
        ghostMoveTimer = 0;
    }

    pacman.speedTimer++;
    if (pacman.speedTimer >= pacman.speedCooldown) {
        movePacman();
        pacman.speedTimer = 0;
    }

    requestAnimationFrame(draw);
}

window.addEventListener("resize", () => {
    if (gameRunning && !gameOver) {
        initGrid();
    }
});
</script>
